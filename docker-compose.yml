services:
  session-browser:
    build: .
    container_name: claude-session-browser
    volumes:
      - ${CLAUDE_SESSIONS_PATH:-~/.claude/projects}:/data/sessions:ro
    environment:
      - SESSIONS_PATH=/data/sessions
      - PORT=${API_PORT:-3001}
    ports:
      - "${PORT:-5173}:5173"
      - "${API_PORT:-3001}:${API_PORT:-3001}"
